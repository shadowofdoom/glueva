name: Glueva release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Verify
        run: |
          bun test bridge/test
          bash claude/plugins/glueva/tests/hooks.test.sh

      - name: Check tag version
        shell: bash
        run: |
          set -euo pipefail
          version="$(bun -e 'console.log((await Bun.file("bridge/package.json").json()).version)')"
          test "${GITHUB_REF_NAME}" = "v${version}"

      - name: Build standalone executables
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release staging

          build_unix() {
            target="$1" platform="$2" architecture="$3"
            directory="staging/${platform}-${architecture}"
            mkdir -p "${directory}"
            bun build bridge/src/cli.ts --compile --minify \
              --no-compile-autoload-dotenv --no-compile-autoload-bunfig \
              --target="${target}" --outfile "${directory}/glueva"
            tar -C "${directory}" -czf \
              "release/glueva-${version}-${platform}-${architecture}.tar.gz" glueva
          }

          build_windows() {
            target="$1" architecture="$2"
            directory="staging/windows-${architecture}"
            mkdir -p "${directory}"
            bun build bridge/src/cli.ts --compile --minify \
              --no-compile-autoload-dotenv --no-compile-autoload-bunfig \
              --target="${target}" --outfile "${directory}/glueva.exe"
            (cd "${directory}" && zip -q \
              "../../release/glueva-${version}-windows-${architecture}.zip" glueva.exe)
          }

          build_unix bun-darwin-arm64 darwin arm64
          build_unix bun-darwin-x64-baseline darwin x64
          build_unix bun-linux-arm64 linux arm64
          build_unix bun-linux-x64-baseline linux x64
          build_windows bun-windows-arm64 arm64
          build_windows bun-windows-x64-baseline x64

          cp bridge/install.sh release/install.sh
          (cd release && sha256sum glueva-* install.sh > checksums.txt)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release/* \
              --title "Glueva ${GITHUB_REF_NAME#v}" \
              --generate-notes --verify-tag
          fi
